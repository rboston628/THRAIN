# This is a basic workflow to help you get started with Actions
# inspired by gist example: NickNaso / cpp.yml
# https://gist.github.com/NickNaso/0d478f1481686d5bcc868cac06620a60
# I also found this article helpful:
# https://www.incredibuild.com/blog/using-github-actions-with-your-c-project
# See this issue in the CxxTest github page: https://github.com/CxxTest/cxxtest/issues/158
name: C/C++ CI

# Controls when the action will run. Triggers the workflow on push
on: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: ["main" ]   
  release:
    # tags:
    # - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # perform static analysis of the code, to ensure no uncaught undefined behavior
  cppcheck:
    name: cpp-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@v0
    - name: Pixi install
      run: pixi install
    - name: Run cppcheck
      run: pixi run cppcheck

  # build and test the code
  build-and-test:
    # The type of runner that the job will run on
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    if: ${{ matrix.config.enabled }}
    strategy:
      fail-fast: false
      matrix:
        config: 
        - name: "ubuntu latest"
          enabled: true
          os: ubuntu-latest
          artifact: "ubuntu_gcc.7z"
          build_type: "Release"
          cc: "gcc"
          cxx: "g++"
          ar: "ar"
          archiver: "7z a"
          generators: "Ninja"
        - name: "macOS gcc"
          enabled: true
          os: macos-latest
          artifact: "macos_gcc.7z"
          build_type: "Release"
          cc: "gcc"
          cxx: "g++"
          ar: "ar"
          archiver: "7za a"
          generators: "Ninja"
        - name: "macOS clang"
          enabled: true
          os: macos-latest
          artifact: "macos_clang.7z"
          build_type: "Release"
          cc: "clang"
          cxx: "clang++"
          ar: "ar"
          archiver: "7za a"
          generators: "Ninja"
        - name: "windows gcc"
          enabled: true
          os: windows-latest
          artifact: "windows_mingw.7z"
          build_type: "Release"
          cc: "x86_64-w64-mingw32-gcc"
          cxx: "x86_64-w64-mingw32-g++"
          ar: "ar"
          archiver: "7z a"
          generators: "Ninja"
        - name: "windows msvc"
          enabled: false
          os: windows-latest
          artifact: "windows_mingw.7z"
          build_type: "Release"
          cc: "cl"
          cxx: "cl"
          ar: "lib"
          archiver: "7z a"
          generators: "Ninja"

    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE so your job can access it
    - uses: actions/checkout@v6

    - name: Print env
      run: |
        echo github.event.action: ${{ github.event.action }}
        echo github.event_name: ${{ github.event_name }}

    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@v0

    - name: Pixi install
      shell: bash
      run: pixi install

    - name: Ensure /tmp exists (Windows bash)
      if: startsWith(matrix.config.os, 'windows')
      shell: bash
      run: mkdir -p /tmp

    - name: Build
      shell: bash
      env:
        CC: ${{ matrix.config.cc }}
        CXX: ${{ matrix.config.cxx }}
        AR: ${{ matrix.config.ar }}
      run: pixi run build

    - name: Run THRAIN
      shell: bash
      run: pixi run thrain sampleinput6.txt

    - name: Run tests
      if: startsWith(matrix.config.os, 'ubuntu') || startsWith(matrix.config.os, 'macos')
      run: pixi run test

  # GCC 9 compatibility lane (backwards-compatibility)
  gcc9:
    name: ubuntu gcc9
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cxxtest gnuplot gcc-9 g++-9

    - name: Build library (GCC 9)
      shell: bash
      run: make library CXX=g++-9

    - name: Build THRAIN (GCC 9)
      shell: bash
      run: make thrain CXX=g++-9

    - name: Run THRAIN (GCC 9)
      shell: bash
      run: ./thrain sampleinput6.txt

    - name: Run tests (GCC 9)
      shell: bash
      run: |
        make -B tests CXX=g++-9
        ./tests/tests.out