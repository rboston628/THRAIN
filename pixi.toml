[project]
name = "thrain"
version = "0.0.0"
description = "THRAIN: a parametric white dwarf asteroseismology code"
channels = ["conda-forge"]
platforms = ["osx-64", "linux-64", "win-64"]

[dependencies]

[target.osx-64.dependencies]
# Toolchain / build
cxx-compiler = "*"
make = "*"

# Linting
python = "3.9.*"
cppcheck = "==2.6.1"

# Runtime tools
gnuplot = "*"

# Test frameworks
cxxtest = "*"
doctest = "*"

[target.linux-64.dependencies]
# Toolchain / build
cxx-compiler = "*"
make = "*"

# Linting
python = "3.9.*"
cppcheck = "==2.6.1"

# Runtime tools
gnuplot = "*"

# Test frameworks
cxxtest = "*"
doctest = "*"

[target.win-64.dependencies]
# Modern win-64 GCC toolchain + Unix tools needed by the makefiles (rm/mkdir)
gcc = "15.*"
gxx = "15.*"
make = "*"
binutils = "*"
m2-coreutils = "*"

[target.win-64.tasks]
thrain = "./thrain.exe"

[tasks]
# Builds the static library and main executable
build = "make library && make thrain"

# Run the main program (use: `pixi run thrain <inputfile>`)
thrain = "./thrain"

cppcheck = "make cppcheck"

# Builds both CxxTest and doctest tests
build-tests = "make cleantests tests-cxxtest tests-doctest"

# Builds and runs the CxxTest test runner
cxxtest = "make tests-cxxtest && ./tests/cxxtest.out"

# Builds and rune the doctest test runner
doctest = "make tests-doctest && ./tests/doctest.out --force-colors=1"

clean = "make clean cleantests"
